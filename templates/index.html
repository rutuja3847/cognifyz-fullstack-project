<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }
        .card {
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
        }
    </style>
</head>

<body class="container py-5">

<h1 class="text-center mb-5">📊 Python Dashboard</h1>

<div class="row">

    <!-- Input Section -->
    <div class="col-md-6">
        <div class="card">
            <h4>🔁 String Reversal</h4>
            <form action="/reverse" method="post">
                <input class="form-control my-3" name="text" placeholder="Enter text" required>
                <button class="btn btn-light w-100">Reverse</button>
            </form>
        </div>

        <div class="card mt-4">
            <h4>🔍 Palindrome Checker</h4>
            <form action="/palindrome" method="post">
                <input class="form-control my-3" name="text" placeholder="Enter text" required>
                <button class="btn btn-light w-100">Check</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div class="col-md-6">
        <div class="card">
            <h4>📈 Analytics Dashboard</h4>

            {% if chart_data %}
            <canvas id="myChart"></canvas>
            {% endif %}

            {% if result %}
            <h5 class="mt-3">Result: {{ result }}</h5>
            {% endif %}
        </div>
        <div class="card mt-4">
    <h4>➕ Calculator</h4>
    <form action="/calculator" method="post">
        <input class="form-control my-2" name="num1" placeholder="Number 1" required>
        <input class="form-control my-2" name="num2" placeholder="Number 2" required>

        <select class="form-control my-2" name="operator">
            <option value="+">Add</option>
            <option value="-">Subtract</option>
            <option value="*">Multiply</option>
            <option value="/">Divide</option>
        </select>

        <button class="btn btn-light w-100">Calculate</button>
    </form>
</div>
<div class="card mt-4">
    <h4>🔐 Password Strength Checker</h4>
    <form action="/password" method="post">
        <input class="form-control my-3" name="password" placeholder="Enter password" required>
        <button class="btn btn-light w-100">Check Strength</button>
    </form>
</div>
    </div>

</div>

<script>
    {% if chart_data %}
    const data = {{ chart_data|safe }};

    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Length', 'Palindrome'],
            datasets: [{
                label: 'Analysis',
                data: [data.length, data.is_palindrome],
                borderWidth: 1
            }]
        }
    });
    {% endif %}
</script>

</body>
</html>
